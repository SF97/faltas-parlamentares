name: Update data and deploy

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v3
        if: github.event_name != 'push'
        with:
          enable-cache: true

      - name: Set up Python
        if: github.event_name != 'push'
        run: uv python install 3.12
        working-directory: ingest

      - name: Install ingest deps
        if: github.event_name != 'push'
        run: uv sync
        working-directory: ingest

      - name: Run ingest (no HTTP cache)
        if: github.event_name != 'push'
        env:
          FALTAS_NO_CACHE: "1"
        run: uv run python -m ingest.main
        working-directory: ingest

      - name: Commit refreshed data
        if: github.event_name != 'push'
        run: |
          if [[ -z "$(git status --porcelain site/src/data)" ]]; then
            echo "No data changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add site/src/data
          git commit -m "chore(data): refresh from parlamento.pt [skip ci]"
          git push

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: site/pnpm-lock.yaml

      - name: Install site deps
        run: pnpm install --frozen-lockfile
        working-directory: site

      - name: Build site
        run: pnpm build
        working-directory: site

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
