    "/Applications/Google Chrome.app/Contents/MacOS/Google Chrome" \
      --headless --disable-gpu --hide-scrollbars --window-size=1200,630 \
      --virtual-time-budget=2000 \

<!doctype html>
<html lang="pt-PT">
<head>
<meta charset="utf-8" />
<style>
  @import url("https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap");
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 1200px; height: 630px; }
  body {
    font-family: "Inter", -apple-system, system-ui, sans-serif;
    background: #fafaf8;
    color: #1a1a1a;
    padding: 56px 80px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    position: relative;
  }
  .accent-bar {
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 14px;
    background: #b8272d;
  }
  .eyebrow {
    font-size: 22px;
    font-weight: 600;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: #b8272d;
  }
  h1 {
    font-size: 80px;
    font-weight: 800;
    line-height: 1.02;
    letter-spacing: -0.02em;
    margin-top: 22px;
    color: #1a1a1a;
  }
  .sub {
    font-size: 26px;
    color: #444;
    line-height: 1.35;
    margin-top: 22px;
    max-width: 980px;
  }
  .bars {
    display: flex;
    align-items: flex-end;
    gap: 10px;
    height: 56px;
    margin-top: 24px;
  }
  .bars span {
    width: 20px;
    background: #b8272d;
    opacity: 0.85;
    border-radius: 2px 2px 0 0;
  }
  footer {
    position: absolute;
    left: 80px;
    right: 80px;
    bottom: 36px;
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    border-top: 1px solid #e5e3de;
    padding-top: 18px;
    font-size: 22px;
    color: #666;
  }
  footer .url { font-weight: 600; color: #1a1a1a; }
</style>
</head>
<body>
  <div class="accent-bar"></div>
  <div>
    <div class="eyebrow">Faltas parlamentares</div>
    <h1>Quem falta mais<br/>ao plenário?</h1>
    <p class="sub">Ranking de presenças e faltas dos 230 deputados da Assembleia da República · XVII Legislatura</p>
    <div class="bars">
      <span style="height: 12%"></span>
      <span style="height: 28%"></span>
      <span style="height: 45%"></span>
      <span style="height: 22%"></span>
      <span style="height: 70%"></span>
      <span style="height: 38%"></span>
      <span style="height: 88%"></span>
      <span style="height: 55%"></span>
      <span style="height: 100%"></span>
      <span style="height: 60%"></span>
      <span style="height: 32%"></span>
      <span style="height: 75%"></span>
      <span style="height: 18%"></span>
      <span style="height: 48%"></span>
      <span style="height: 82%"></span>
    </div>
  </div>
</body>
</html>
